name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - 'feature/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # main branch → gh-pages root (https://kkristofh.github.io/bmw-e87-obd2/)
      - name: Deploy main → root
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false

      # feature/* branch → gh-pages/preview/ (https://kkristofh.github.io/bmw-e87-obd2/preview/)
      - name: Deploy feature → /preview
        if: github.ref != 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          target-folder: preview
          clean: false
